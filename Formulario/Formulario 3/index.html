<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Admisión</title>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page">

  <!-- Barra naranja izquierda -->
  <div class="sidebar-left"></div>

  <!-- Barra naranja derecha -->
  <div class="sidebar-right"></div>

  <!-- Etiqueta lateral izquierda -->
  <div class="side-label">w w w . y o u r w e b h e r e . c o m</div>

  <!-- Contenido -->
  <div class="content">

    <!-- HEADER -->
    <div class="header">
      <div class="header-text">
        <h1 class="titulo">FORMULARIO<br>DE ADMISIÓN</h1>
        <p class="bienvenida">¡Bienvenido al proceso de admisión!</p>
        <p class="subtitulo"></p>
      </div>
      <div class="logo-box">Mi<br>LOGO</div>
    </div>

    <!-- SECCIÓN DATOS PERSONALES -->
    <div class="seccion-header">DATOS PERSONALES</div>

    <!-- Nombre y Apellidos -->
    <div class="campo-group">
      <label class="campo-label">NOMBRE Y APELLIDOS</label>
      <div class="campo-valor"></div>
      <div class="campo-linea naranja"></div>
    </div>

    <!-- Fecha de nacimiento + Sexo -->
    <div class="fila-dos">
      <div class="campo-group">
        <label class="campo-label">FECHA DE NACIMIENTO</label>
        <div class="campo-valor"></div>
        <div class="campo-linea naranja"></div>
      </div>
      <div class="campo-group">
        <label class="campo-label">SEXO</label>
        <div class="checkboxes">
          <label class="check-item">
            <span class="check-box"></span>
            <span>Masculino</span>
          </label>
          <label class="check-item">
            <span class="check-box"></span>
            <span>Femenino</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Número de Teléfono -->
    <div class="campo-group">
      <label class="campo-label">NÚMERO DE TELÉFONO</label>
      <div class="campo-valor"></div>
      <div class="campo-linea naranja"></div>
    </div>

    <!-- Dirección -->
    <div class="campo-group mt">
      <label class="campo-label">DIRECCIÓN</label>
      <div class="campo-input-bg"></div>
    </div>

    <!-- Ciudad + Región -->
    <div class="fila-dos">
      <div class="campo-group">
        <label class="campo-label">CIUDAD</label>
        <div class="campo-input-bg"></div>
      </div>
      <div class="campo-group">
        <label class="campo-label">REGIÓN</label>
        <div class="campo-input-bg"></div>
      </div>
    </div>

    <!-- Código Postal + País -->
    <div class="fila-dos">
      <div class="campo-group">
        <label class="campo-label">CÓDIGO POSTAL</label>
        <div class="campo-input-bg"></div>
      </div>
      <div class="campo-group">
        <label class="campo-label">PAÍS</label>
        <div class="campo-input-bg"></div>
      </div>
    </div>

    <!-- Correo Electrónico -->
    <div class="campo-group">
      <label class="campo-label">CORREO ELECTRÓNICO</label>
      <div class="campo-input-bg"></div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-texto">
        <p><em> Desarrollo de Jeremyh</em></p>
      </div>
      <div class="footer-firma">
        <div class="firma-linea"></div>
        <span class="firma-label">Firma/Fecha</span>
      </div>
    </div>

  </div>
</div>

</body>
</html>
