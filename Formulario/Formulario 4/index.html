<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario Médico</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="page">

  <!-- Etiqueta
  

  <!-HEADER VERDE -->
  <div class="header-verde">
    <p class="header-top-text">
    <div class="header-main">
      <div class="logo-icono">
        <div class="icono-cuadro"></div>
      </div>
      <div class="header-titles">
        <h1 class="titulo-principal">FORMULARIO MÉDICO</h1>
        <h2 class="titulo-sub">NOMBRE DEL CENTRO MÉDICO</h2>
      </div>
    </div>
  </div>

  <!-- MARCA DE AGUA -->
  <div class="watermark">3+</div>

  <!-- CONTENIDO -->
  <div class="content">

    <!-- PACIENTE -->
    <div class="seccion-titulo">INFORMACIÓN DEL PACIENTE</div>
    <div class="linea-verde"></div>

    <div class="campo"><label>Nombre y Apellidos:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Fecha de Nacimiento:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Dirección:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Teléfono:</label><div class="campo-linea"></div></div>

    <!-- Sexo  -->
    <div class="campo campo-sexo">
      <label>Sexo:</label>
      <label class="chk-item"><span class="chk-box"></span> Masculino</label>
      <label class="chk-item"><span class="chk-box"></span> Femenino</label>
      <label class="chk-item"><span class="chk-box"></span> Otro</label>
    </div>

    <div class="campo"><label>Código Postal:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Correo Electrónico:</label><div class="campo-linea"></div></div>

    <!-- VISITA -->
    <div class="seccion-fila">
      <div class="seccion-titulo">MOTIVO DE LA VISITA</div>
      <span class="motivo-hint">Describir los síntomas o el motivo de esta visita</span>
    </div>
    <div class="linea-verde"></div>

    <div class="linea-punteada"></div>
    <div class="linea-punteada"></div>
    <div class="linea-punteada"></div>
    <div class="linea-punteada"></div>

    <!--  SEGURO -->
    <div class="seccion-titulo mt">INFORMACIÓN DEL SEGURO</div>
    <div class="linea-verde"></div>

    <div class="campo"><label>Seguro Proveniente:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Número de Póliza:</label><div class="campo-linea"></div></div>

    <!-- INFORMACIÓN DE CONTACTO -->
    <div class="seccion-titulo mt">INFORMACIÓN DE CONTACTO EN CASO DE EMERGENCIA</div>
    <div class="linea-verde"></div>

    <div class="campo"><label>Nombre y Apellidos:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Número de Teléfono:</label><div class="campo-linea"></div></div>
    <div class="campo"><label>Email:</label><div class="campo-linea"></div></div>

    <!-- FECHA  -->
    <div class="fecha-firma">
      <span class="fecha-texto">Mes, 10, 2029</span>
      <div class="firma-area">
        <div class="firma-linea"></div>
        <span class="firma-label">Nombre y Apellidos</span>
      </div>
    </div>

  </div>


  <div class="footer-verde">
    <div class="footer-left">
      <div class="footer-web">WWW.YOURWEBHERE.COM</div>
      <div class="footer-social">
        <span class="ig-icon">&#9711;</span> @tuperfilaqui
      </div>
    </div>
    <div class="logo-box">TU<br>LOGO</div>
  </div>

</div>

</body>
</html>
