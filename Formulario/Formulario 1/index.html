<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Inscripción</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="page">
  <div class="sidebar"></div>

  <div class="content">
    <!-- Etiqueta lateral -->
    <div class="side-label">Plantilla de Formulario de Inscripción</div>

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="hamburger">
          <span></span><span></span><span></span>
        </div>
        <h1>Formulario de Inscripción</h1>
      </div>
      <div class="web-badge">www.yourwebhere.com</div>
    </div>

    <!-- Solicitud de ingreso -->
    <div class="form-group">
      <label>Solicitud de ingreso a:</label>
      <input type="text" placeholder="Tu texto aquí">
    </div>

    <!-- Director/Presidente -->
    <div class="form-group">
      <label>Director / Presidente</label>
      <input type="text">
    </div>

    <!-- Tipo de Afiliación -->
    <div class="afiliacion">
      <label class="main-label">Tipo de Afiliación</label>
      <div class="checkboxes">
        <div class="checkbox-item">
          <input type="checkbox" id="bronce">
          <label for="bronce">Bronce</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="plata">
          <label for="plata">Plata</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="oro">
          <label for="oro">Oro</label>
        </div>
      </div>
    </div>

    <!-- Titular de cuenta -->
    <div class="inline-field">
      <label>Solicitantes / Titular de cuenta</label>
      <input type="text">
    </div>

    <!-- Nombre y Dirección -->
    <div class="row">
      <div class="form-group">
        <label>Nombre de Pila</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Dirección</label>
        <input type="text">
      </div>
    </div>

    <!-- Fecha Nacimiento y Nationality -->
    <div class="row">
      <div class="form-group">
        <label>Fecha de Nacimiento</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Nationality</label>
        <input type="text">
      </div>
    </div>

    <!-- Bloques fecha y código -->
    <div class="row">
      <div class="form-group">
        <label>Fecha de Nacimiento</label>
        <div class="fecha-bloques">
          <div class="bloque"></div>
          <div class="bloque"></div>
          <span class="separator">/</span>
          <div class="bloque"></div>
          <div class="bloque"></div>
          <span class="separator">/</span>
          <div class="bloque"></div>
          <div class="bloque"></div>
          <div class="bloque"></div>
          <div class="bloque"></div>
        </div>
      </div>
      <div class="form-group">
        <label>Código</label>
        <div class="codigo-bloques">
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
          <div class="codigo-bloque"></div>
        </div>
      </div>
    </div>

    <!-- Sexo y Ciudad/País -->
    <div class="row">
      <div class="form-group">
        <label>Sexo</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Ciudad / País</label>
        <input type="text">
      </div>
    </div>

    <!-- Correo Electrónico -->
    <div class="form-group">
      <label>Correo Electrónico</label>
      <div class="email-wrapper">
        <span class="at">@</span>
        <input type="email">
      </div>
    </div>

    <!-- Permiso de Conducir y Otro Número -->
    <div class="row">
      <div class="form-group">
        <label>Permiso de Conducir</label>
        <input type="text">
      </div>
      <div class="form-group">
        <label>Otro Número de Tarjeta</label>
        <input type="text">
      </div>
    </div>

    <!-- Footer -->
    <div class="form-footer">
      <div class="footer-text">
        <em>Compruebe que el contenido del formulario contenga correctamente sus datos personales.</em><br>
        <em>Personaliza online un formulario de registro en Edit.org</em>
      </div>
      <div class="footer-bottom">
        <div class="logo-box">TU<br>LOGO</div>
        <div class="firma-area">
          <div class="firma-line"></div>
          <span>Firma / Fecha</span>
        </div>
      </div>
    </div>

  </div>
</div>

</body>
</html>
